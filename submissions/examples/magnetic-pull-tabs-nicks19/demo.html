<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Magnetic Pull Tabs Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e5ec; /* Neumorphic matching background */
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .demo-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }
        h2 {
            color: #5c6b79;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <h2>Neumorphic Magnetic Tabs</h2>
        
        <div class="ease-neu-tabs-container">
            <input type="radio" id="tab1" name="neu-tabs" checked>
            <input type="radio" id="tab2" name="neu-tabs">
            <input type="radio" id="tab3" name="neu-tabs">

            <label for="tab1" class="ease-neu-tab">Monthly</label>
            <label for="tab2" class="ease-neu-tab">Annually</label>
            <label for="tab3" class="ease-neu-tab">Lifetime</label>

            <!-- The active background highlight -->
            <div class="ease-neu-active-indicator"></div>
        </div>
    </div>
</body>
</html>
