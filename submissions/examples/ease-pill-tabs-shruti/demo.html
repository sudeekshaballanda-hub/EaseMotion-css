<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Pill Tabs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h2>Horizontal Sliding Pill</h2>
  <div class="ease-pill-tabs horizontal">
    <input type="radio" name="horizontal" id="daily" checked>
    <input type="radio" name="horizontal" id="weekly">
    <input type="radio" name="horizontal" id="monthly">

    <div class="pill"></div>

    <label for="daily">Daily</label>
    <label for="weekly">Weekly</label>
    <label for="monthly">Monthly</label>
  </div>

  <h2>Bounce Slide</h2>
  <div class="ease-pill-tabs bounce">
    <input type="radio" name="bounce" id="b1" checked>
    <input type="radio" name="bounce" id="b2">
    <input type="radio" name="bounce" id="b3">

    <div class="pill"></div>

    <label for="b1">Overview</label>
    <label for="b2">Reports</label>
    <label for="b3">Analytics</label>
  </div>

  <h2>Instant Snap</h2>
  <div class="ease-pill-tabs snap">
    <input type="radio" name="snap" id="s1" checked>
    <input type="radio" name="snap" id="s2">
    <input type="radio" name="snap" id="s3">

    <div class="pill"></div>

    <label for="s1">Basic</label>
    <label for="s2">Pro</label>
    <label for="s3">Enterprise</label>
  </div>

  <h2>Vertical Pill</h2>

  <div class="ease-pill-tabs vertical">
    <input type="radio" name="vertical" id="v1" checked>
    <input type="radio" name="vertical" id="v2">
    <input type="radio" name="vertical" id="v3">

    <div class="pill"></div>

    <label for="v1">General</label>
    <label for="v2">Profile</label>
    <label for="v3">Security</label>
  </div>

</body>
</html>
