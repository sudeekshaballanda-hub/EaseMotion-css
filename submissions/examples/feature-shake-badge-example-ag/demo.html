<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shake Badge Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-badges-container-ag">
        <!-- Badge with shake on hover -->
        <span class="ease-shake-badge-ag" role="status" aria-label="Error">Error</span>
        
        <!-- Badge with infinite shake (e.g. for loading/attention) -->
        <span class="ease-shake-badge-ag ease-shake-infinite-ag" role="status" aria-label="Loading">Loading...</span>
    </div>
</body>
</html>
