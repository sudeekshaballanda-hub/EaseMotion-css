<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player UI - EaseMotion CSS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- EaseMotion CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
    
    <!-- Local Custom Styles -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="player-wrapper ease-fade-in ease-duration-slow">
        
        <!-- Music Player Card -->
        <div class="player-card ease-scale-up ease-delay-200" id="playerCard">
            
            <!-- Album Art -->
            <div class="album-container">
                <div class="album-art" id="albumArt">
                    <!-- Using a gradient as a placeholder for album cover -->
                    <div class="album-cover"></div>
                </div>
                <!-- Playing Indicator -->
                <div class="playing-indicator" id="playingIndicator">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Track Info -->
            <div class="track-info ease-slide-up ease-delay-300">
                <h2 class="track-title">Midnight City</h2>
                <p class="track-artist">Synthwave Dreams</p>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container ease-slide-up ease-delay-400">
                <span class="time current-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar" onclick="seekTrack(event)">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb"></div>
                </div>
                <span class="time total-time">3:45</span>
            </div>

            <!-- Controls -->
            <div class="controls ease-slide-up ease-delay-500">
                <button class="control-btn secondary ease-hover-lift" aria-label="Previous">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                
                <button class="control-btn primary ease-hover-lift ease-scale-up" id="playBtn" onclick="togglePlay()" aria-label="Play/Pause">
                    <svg class="play-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="pause-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                
                <button class="control-btn secondary ease-hover-lift" aria-label="Next">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

        </div>
    </div>

    <script>
        let isPlaying = false;
        let progressInterval;
        let currentProgress = 0;

        function togglePlay() {
            isPlaying = !isPlaying;
            const playerCard = document.getElementById('playerCard');
            const playIcon = document.querySelector('.play-icon');
            const pauseIcon = document.querySelector('.pause-icon');
            const albumArt = document.getElementById('albumArt');
            const indicator = document.getElementById('playingIndicator');

            if (isPlaying) {
                playerCard.classList.add('playing');
                albumArt.classList.add('spinning');
                indicator.classList.add('active');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                startProgress();
            } else {
                playerCard.classList.remove('playing');
                albumArt.classList.remove('spinning');
                indicator.classList.remove('active');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                stopProgress();
            }
        }

        function startProgress() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (currentProgress >= 100) {
                    currentProgress = 0;
                    togglePlay(); // Auto pause at end
                } else {
                    currentProgress += 0.5;
                    updateProgressUI();
                }
            }, 100);
        }

        function stopProgress() {
            clearInterval(progressInterval);
        }

        function updateProgressUI() {
            const fill = document.getElementById('progressFill');
            const timeDisplay = document.getElementById('currentTime');
            
            fill.style.width = currentProgress + '%';
            
            // Calculate time (Total 225 seconds for 3:45)
            const totalSeconds = 225;
            const currentSeconds = Math.floor((currentProgress / 100) * totalSeconds);
            const mins = Math.floor(currentSeconds / 60);
            const secs = currentSeconds % 60;
            timeDisplay.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function seekTrack(event) {
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const width = rect.width;
            
            currentProgress = (clickX / width) * 100;
            updateProgressUI();
        }
    </script>
</body>
</html>
