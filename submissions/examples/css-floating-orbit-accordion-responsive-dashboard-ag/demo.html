<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Floating Orbit Accordion (Responsive Dashboard)</title>

    <!-- Showcase Page Stylesheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard-container">
      <!-- Dashboard Header -->
      <header class="dashboard-header" role="banner">
        <span class="dashboard-tag">System Telemetry</span>
        <h1>Responsive Infrastructure Panel</h1>
        <p>
          A pure CSS interactive accordion component featuring a smooth
          **Floating Orbit** active indicator, designed to match high-density
          console dashboard layouts.
        </p>
      </header>

      <!-- Accordion Component -->
      <main
        class="ease-dashboard-accordion"
        role="main"
        aria-label="System status checklist"
      >
        <!-- Item 1: CPU load (Indigo status) -->
        <details class="ease-accordion-item ease-item-indigo" open>
          <summary class="ease-accordion-header" aria-expanded="true">
            <!-- Floating Orbit Indicator -->
            <div class="ease-orbit-wrapper" aria-hidden="true">
              <div class="ease-orbit-ring"></div>
              <div class="ease-orbit-core"></div>
              <div class="ease-orbit-satellite"></div>
            </div>

            <!-- Category Title -->
            <div class="ease-header-info">
              <h3 class="ease-header-title">Thread Pool Analytics</h3>
              <p class="ease-header-desc">
                Active container clusters & core loads
              </p>
            </div>

            <!-- Status Badge -->
            <span class="ease-status-badge ease-indigo">Processing</span>

            <!-- Caret -->
            <div class="ease-accordion-caret" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z" /></svg>
