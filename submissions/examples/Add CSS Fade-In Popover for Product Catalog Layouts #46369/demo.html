<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Fade-In Popover - Product Catalog</title>
  <link rel="stylesheet" href="../../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="catalog-layout">
    <div class="product-grid">
      
      <!-- Product Card 1 -->
      <div class="product-card">
        <div class="product-image-container">
          <div class="product-image-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <!-- Popover Container acting as Quick View Trigger -->
          <div class="popover-container quick-view-container">
            <button class="quick-view-btn" aria-expanded="false" aria-controls="quick-view-popover">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="11" y1="8" x2="11" y2="14"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
              </svg>
              Quick Info
            </button>
            
            <!-- Popover Wrapper (Fade-In Animation) -->
            <div class="popover-wrapper" id="quick-view-popover" role="dialog" aria-label="Product Details">
              <div class="popover-content">
                <div class="popover-header">
                  <h4>Product Specs</h4>
                </div>
                <div class="popover-body">
                  <ul class="specs-list">
                    <li><strong>Material:</strong> 100% Organic Cotton</li>
                    <li><strong>Fit:</strong> Relaxed, true to size</li>
                    <li><strong>Care:</strong> Machine wash cold</li>
                  </ul>
                  <div class="color-options">
                    <span class="color-swatch" style="background: #1e293b;" title="Navy"></span>
                    <span class="color-swatch" style="background: #94a3b8;" title="Grey"></span>
                    <span class="color-swatch" style="background: #f8fafc; border: 1px solid #cbd5e1;" title="White"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <div class="product-info">
          <div class="product-meta">
            <span class="product-category">Apparel</span>
            <span class="product-rating">
              ★ 4.8 (120)
            </span>
          </div>
          <h3 class="product-title">Premium Minimalist Hoodie</h3>
          <div class="product-price">$85.00</div>
          
          <button class="add-to-cart-btn">Add to Cart</button>
        </div>
      </div>
      
    </div>
  </div>
</body>
</html>
