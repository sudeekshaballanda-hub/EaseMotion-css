<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiggle Dropdown Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dropdown-container-ag">
    <button class="dropdown-trigger-ag" id="wiggleDropdownBtn" aria-haspopup="true" aria-expanded="true">
      Options
      <svg class="dropdown-chevron-ag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>
    
    <!-- The dropdown menu itself. Note the exit animation class is applied when hiding. -->
    <ul class="dropdown-menu-ag" id="wiggleDropdownMenu" role="menu" aria-labelledby="wiggleDropdownBtn">
      <li role="menuitem"><a href="#">Profile</a></li>
      <li role="menuitem"><a href="#">Settings</a></li>
      <li role="menuitem"><a href="#">Help</a></li>
      <li role="menuitem"><a href="#">Logout</a></li>
    </ul>
  </div>

  <script>
    const btn = document.getElementById('wiggleDropdownBtn');
    const menu = document.getElementById('wiggleDropdownMenu');
    let isExpanded = true;

    btn.addEventListener('click', () => {
      isExpanded = !isExpanded;
      btn.setAttribute('aria-expanded', isExpanded);
      
      if (!isExpanded) {
        // Trigger exit animation
        menu.classList.add('ease-wiggle-out-ag');
        
        // Remove from DOM/hide after animation completes
        menu.addEventListener('animationend', function handleAnimationEnd() {
          menu.classList.remove('ease-wiggle-out-ag');
          menu.style.display = 'none';
          menu.removeEventListener('animationend', handleAnimationEnd);
        });
      } else {
        // Show immediately (entrance animation could go here, but focusing on exit)
        menu.style.display = 'block';
        menu.classList.remove('ease-wiggle-out-ag');
      }
    });
  </script>
</body>
</html>
