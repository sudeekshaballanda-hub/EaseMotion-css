<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooldown Ring – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🔄 Cooldown Ring</h1>
    <p class="subtitle">Ability cooldown with swirling fill</p>

    <div class="cd-container">
      <div class="cd-scene">
        <!-- Cooldown Ring -->
        <div class="cooldown-ring">
          <!-- Ring background -->
          <div class="ring-bg"></div>

          <!-- Swirling fill -->
          <div class="ring-fill">
            <div class="swirl swirl-1"></div>
            <div class="swirl swirl-2"></div>
            <div class="swirl swirl-3"></div>
            <div class="swirl swirl-4"></div>
            <div class="swirl swirl-5"></div>
            <div class="swirl swirl-6"></div>
            <div class="swirl swirl-7"></div>
            <div class="swirl swirl-8"></div>
          </div>

          <!-- Glow effect -->
          <div class="ring-glow"></div>

          <!-- Ability icon -->
          <div class="ability-icon">⚡</div>

          <!-- Cooldown text -->
          <div class="cooldown-text" id="cooldownText">READY</div>

          <!-- Sparkle particles -->
          <div class="sparkle s1"></div>
          <div class="sparkle s2"></div>
          <div class="sparkle s3"></div>
          <div class="sparkle s4"></div>
          <div class="sparkle s5"></div>
          <div class="sparkle s6"></div>
          <div class="sparkle s7"></div>
          <div class="sparkle s8"></div>
          <div class="sparkle s9"></div>
          <div class="sparkle s10"></div>
          <div class="sparkle s11"></div>
          <div class="sparkle s12"></div>
        </div>

        <!-- Controls -->
        <div class="cd-controls">
          <button id="activateBtn">⚡ Activate Ability</button>
          <button id="resetBtn">⟳ Reset</button>
          <label>
            Cooldown Speed
            <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
          </label>
          <label>
            Cooldown Duration
            <input type="range" id="durationControl" min="2" max="10" step="0.5" value="5" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const ringFill = document.querySelector('.ring-fill');
      const ringGlow = document.querySelector('.ring-glow');
      const cooldownText = document.getElementById('cooldownText');
      const abilityIcon = document.querySelector('.ability-icon');
      const sparkles = document.querySelectorAll('.sparkle');
      const swirls = document.querySelectorAll('.swirl');

      const activateBtn = document.getElementById('activateBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');
      const durationInput = document.getElementById('durationControl');

      let speedMultiplier = 1;
      let durationMultiplier = 1;
      let isOnCooldown = false;
      let cooldownProgress = 0;
      let animationFrame = null;
      let lastTimestamp = 0;
      let cooldownDuration = 5;

      // ----- Apply speed -----
      function applySpeed() {
        // Swirl rotation
        swirls.forEach((swirl, i) => {
          const duration = (2 + i * 0.15) / speedMultiplier;
          swirl.style.setProperty('--swirl-duration', duration + 's');
          swirl.style.setProperty('--swirl-delay', ((i * 0.02) / speedMultiplier) + 's');
        });

        // Sparkles
        sparkles.forEach((sp, i) => {
          const duration = (0.8 + (i % 3) * 0.1) / speedMultiplier;
          sp.style.setProperty('--sparkle-duration', duration + 's');
          sp.style.setProperty('--sparkle-delay', ((i * 0.03) / speedMultiplier) + 's');
        });

        // Ring glow
        ringGlow.style.setProperty('--glow-duration', (1.5 / speedMultiplier) + 's');
      }

      // ----- Activate ability -----
      function activateAbility() {
        if (isOnCooldown) return;

        isOnCooldown = true;
        cooldownProgress = 0;
        const duration = cooldownDuration * 1000 / speedMultiplier;

        // Update UI
        abilityIcon.style.transform = 'scale(0.8)';
        setTimeout(() => {
          abilityIcon.style.transform = 'scale(1)';
        }, 150 / speedMultiplier);

        // Sparkle burst
        sparkles.forEach((sp) => {
          sp.classList.remove('active');
          void sp.offsetWidth;
          sp.classList.add('active');
        });

        // Activate glow
        ringGlow.classList.add('active');
        setTimeout(() => {
          ringGlow.classList.remove('active');
        }, 300 / speedMultiplier);

        activateBtn.textContent = '⚡ Activating...';
        setTimeout(() => {
          activateBtn.textContent = '⚡ Activate Ability';
        }, 300 / speedMultiplier);

        // Start cooldown
        const startTime = Date.now();

        function updateCooldown() {
          const elapsed = Date.now() - startTime;
          cooldownProgress = Math.min(elapsed / duration, 1);

          // Update ring fill (conic gradient)
          const degrees = cooldownProgress * 360;
          ringFill.style.background = `conic-gradient(
            from ${degrees}deg,
            rgba(100, 200, 255, 0.8) 0%,
            rgba(60, 180, 255, 0.6) 20%,
            rgba(40, 160, 255, 0.4) 40%,
            rgba(60, 180, 255, 0.6) 60%,
            rgba(100, 200, 255, 0.8) 80%,
            rgba(60, 180, 255, 0.4) 100%
          )`;

          // Update text
          const remaining = Math.ceil((1 - cooldownProgress) * duration / 1000);
          if (cooldownProgress < 1) {
            cooldownText.textContent = remaining + 's';
            cooldownText.style.opacity = '1';
          } else {
            cooldownText.textContent = 'READY';
            cooldownText.style.opacity = '1';
            isOnCooldown = false;
            ringFill.style.background = 'conic-gradient(from 0deg, rgba(100, 200, 255, 0.8), rgba(60, 180, 255, 0.6))';
            return;
          }

          if (cooldownProgress < 1) {
            requestAnimationFrame(updateCooldown);
          }
        }

        updateCooldown();

        // Auto-ready after cooldown
        setTimeout(() => {
          if (isOnCooldown) {
            isOnCooldown = false;
            cooldownText.textContent = 'READY';
            ringFill.style.background = 'conic-gradient(from 0deg, rgba(100, 200, 255, 0.8), rgba(60, 180, 255, 0.6))';
          }
        }, duration + 100);
      }

      // ----- Reset -----
      function resetCooldown() {
        isOnCooldown = false;
        cooldownProgress = 0;
        ringFill.style.background = 'conic-gradient(from 0deg, rgba(100, 200, 255, 0.8), rgba(60, 180, 255, 0.6))';
        cooldownText.textContent = 'READY';
        ringGlow.classList.remove('active');
        sparkles.forEach(sp => sp.classList.remove('active'));
        abilityIcon.style.transform = 'scale(1)';
        activateBtn.textContent = '⚡ Activate Ability';
        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Update duration -----
      function updateDuration(value) {
        cooldownDuration = parseFloat(value);
        if (!isOnCooldown) {
          cooldownText.textContent = 'READY';
        }
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Animate ready state glow
        if (!isOnCooldown) {
          const pulse = Math.sin(timestamp / 1500) * 0.1 + 0.9;
          ringGlow.style.opacity = 0.1 + pulse * 0.15;
          ringGlow.style.transform = `translate(-50%, -50%) scale(${0.9 + pulse * 0.05})`;
        }

        // Animate sparkles that are active
        sparkles.forEach((sp, i) => {
          if (sp.classList.contains('active')) {
            const scale = 0.5 + Math.sin(timestamp / 500 + i) * 0.3 + 0.2;
            sp.style.transform = `scale(${scale})`;
          }
        });

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        resetCooldown();

        applySpeed();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Auto-activate after 1.5 seconds to show effect
        setTimeout(() => {
          activateAbility();
        }, 1500);

        // Auto-activate again after cooldown
        setTimeout(() => {
          setTimeout(() => {
            activateAbility();
          }, 500);
        }, cooldownDuration * 1000 / speedMultiplier + 2000);
      }

      // ----- Event listeners -----
      activateBtn.addEventListener('click', activateAbility);
      resetBtn.addEventListener('click', resetCooldown);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      durationInput.addEventListener('input', function() {
        updateDuration(this.value);
      });

      // Click on ring to activate
      document.querySelector('.cooldown-ring').addEventListener('click', activateAbility);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
